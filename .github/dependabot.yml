version: 2

updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      nix-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - automated
